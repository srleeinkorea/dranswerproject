<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedi-Air Mobile App</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0b1220;
        --card: #121a2f;
        --border: #1f2a44;
        --blue: #2563eb;
        --yellow: #f59e0b;
        --red: #ef4444;
        --text: #f1f5f9;
        --muted: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(circle at top, #132042 0%, #0b1220 70%);
        font-family: "Inter", sans-serif;
        display: flex;
        justify-content: center;
        padding: 30px 0;
      }

      .app {
        width: 390px;
        min-height: 800px;
        background: var(--bg);
        border-radius: 40px;
        padding: 20px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        color: var(--text);
        position: relative;
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }

      .status-card {
        background: var(--card);
        padding: 20px;
        border-radius: 20px;
        border: 1px solid var(--border);
        margin-bottom: 20px;
        text-align: center;
        transition: 0.4s;
      }

      .status-card.yellow {
        box-shadow: 0 0 25px rgba(245, 158, 11, 0.4);
      }

      .status-card.red {
        box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
      }

      .status-label {
        font-size: 14px;
        color: var(--muted);
      }

      .status-value {
        font-size: 22px;
        font-weight: 700;
        margin-top: 8px;
      }

      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .metric {
        background: var(--card);
        padding: 16px;
        border-radius: 16px;
        border: 1px solid var(--border);
      }

      .metric-title {
        font-size: 12px;
        color: var(--muted);
      }

      .metric-value {
        font-size: 20px;
        font-weight: 600;
        margin-top: 6px;
      }

      .gauge {
        margin: 30px 0;
        text-align: center;
      }

      .gauge-circle {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        margin: 0 auto;
        background: conic-gradient(var(--blue) 0% 70%, #1f2a44 70%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 700;
      }

      .message-box {
        background: var(--card);
        padding: 16px;
        border-radius: 16px;
        border: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }

      .button-group {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-yellow {
        background: var(--yellow);
        color: white;
      }
      .btn-red {
        background: var(--red);
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="header">
        <h1>👶 환아 B (5세)</h1>
      </div>

      <div class="status-card" id="statusCard">
        <div class="status-label">현재 상태</div>
        <div class="status-value" id="statusText">Stable</div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-title">Respiratory Rate</div>
          <div class="metric-value" id="rr">18</div>
        </div>

        <div class="metric">
          <div class="metric-title">Minute Ventilation</div>
          <div class="metric-value" id="minvent">6.0</div>
        </div>

        <div class="metric">
          <div class="metric-title">Leak</div>
          <div class="metric-value" id="leak">정상</div>
        </div>

        <div class="metric">
          <div class="metric-title">Temperature</div>
          <div class="metric-value" id="temp">36.7°C</div>
        </div>
      </div>

      <div class="gauge">
        <div class="gauge-circle" id="gauge">70%</div>
        <div style="margin-top: 8px; font-size: 13px; color: var(--muted)">
          Stability Index
        </div>
      </div>

      <div class="message-box" id="message">현재 상태는 안정적입니다.</div>

      <div class="button-group">
        <button class="btn-yellow" onclick="runYellow()">🟠 Yellow</button>
        <button class="btn-red" onclick="runRed()">🔴 Red</button>
      </div>
    </div>

    <script>
      function runYellow() {
        document.getElementById("rr").innerText = "22";
        document.getElementById("minvent").innerText = "5.4";
        document.getElementById("leak").innerText = "정상";
        document.getElementById("temp").innerText = "37.5°C";

        const status = document.getElementById("statusCard");
        status.className = "status-card yellow";
        document.getElementById("statusText").innerText = "🟠 Yellow";

        document.getElementById("gauge").innerText = "55%";
        document.getElementById("gauge").style.background =
          "conic-gradient(#f59e0b 0% 55%, #1f2a44 55%)";

        document.getElementById("message").innerText =
          "최근 호흡 수치 변동이 감지되었습니다. 의료진과 상담을 권장합니다.";
      }

      function runRed() {
        document.getElementById("rr").innerText = "30";
        document.getElementById("minvent").innerText = "4.8";
        document.getElementById("leak").innerText = "증가";
        document.getElementById("temp").innerText = "38.7°C";

        const status = document.getElementById("statusCard");
        status.className = "status-card red";
        document.getElementById("statusText").innerText = "🔴 Red";

        document.getElementById("gauge").innerText = "30%";
        document.getElementById("gauge").style.background =
          "conic-gradient(#ef4444 0% 30%, #1f2a44 30%)";

        document.getElementById("message").innerText =
          "즉각적인 의료진 확인이 필요합니다. 응급실 방문을 권장합니다.";
      }
    </script>
  </body>
</html>
