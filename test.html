<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRO App Demo</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f5f7fa;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --green: #16a34a;
        --amber: #f59e0b;
        --red: #dc2626;
        --primary: #2563eb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        display: flex;
        justify-content: center;
        padding: 40px 16px;
      }

      .phone {
        width: 420px;
        background: var(--card);
        border-radius: 32px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        border: 1px solid var(--line);
      }

      .header {
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        font-size: 16px;
      }

      .badge {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        font-weight: 600;
      }

      .content {
        padding: 20px;
        background: linear-gradient(180deg, #f9fafb, #eef2f7);
      }

      .section {
        background: white;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .section h2 {
        font-size: 13px;
        margin-bottom: 12px;
      }

      .input {
        width: 100%;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        margin-bottom: 10px;
      }

      .chips {
        display: flex;
        gap: 8px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 12px;
        cursor: pointer;
      }

      .chip.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      .button {
        width: 100%;
        padding: 12px;
        border-radius: 14px;
        border: none;
        font-weight: 600;
        background: var(--primary);
        color: white;
        cursor: pointer;
        margin-top: 6px;
      }

      .result {
        margin-top: 12px;
        padding: 12px;
        border-radius: 14px;
        font-size: 12px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="phone">
      <div class="header">
        <h1>주간 PRO 체크</h1>
        <div
          id="statusBadge"
          class="badge"
          style="background: #dcfce7; color: #166534"
        >
          GREEN
        </div>
      </div>

      <div class="content">
        <div class="section">
          <h2>기초 수치</h2>
          <input
            id="temp"
            class="input"
            type="number"
            step="0.1"
            placeholder="체온 (℃)"
          />
          <input id="spo2" class="input" type="number" placeholder="SpO₂ (%)" />
        </div>

        <div class="section">
          <h2>호흡 상태</h2>
          <div class="chips">
            <div class="chip active" data-value="same">비슷</div>
            <div class="chip" data-value="worse">나빠짐</div>
          </div>
        </div>

        <button class="button" onclick="analyze()">기록 완료</button>

        <div id="resultBox" class="result"></div>
      </div>
    </div>

    <script>
      let breathState = "same";

      document.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          document
            .querySelectorAll(".chip")
            .forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");
          breathState = chip.dataset.value;
        });
      });

      function analyze() {
        const temp = parseFloat(document.getElementById("temp").value);
        const spo2 = parseFloat(document.getElementById("spo2").value);

        const badge = document.getElementById("statusBadge");
        const result = document.getElementById("resultBox");

        let status = "GREEN";
        let message = "안정 상태입니다.";

        if (spo2 < 94 || breathState === "worse") {
          status = "AMBER";
          message =
            "안정성 저하 경향이 감지되었습니다. 의료진 검토가 필요합니다.";
        }

        if (spo2 < 90) {
          status = "RED";
          message = "저산소 위험 가능성. 즉시 의료진 연락이 필요합니다.";
        }

        badge.textContent = status;
        badge.style.background =
          status === "GREEN"
            ? "#dcfce7"
            : status === "AMBER"
              ? "#fef3c7"
              : "#fee2e2";
        badge.style.color =
          status === "GREEN"
            ? "#166534"
            : status === "AMBER"
              ? "#92400e"
              : "#991b1b";

        result.style.display = "block";
        result.style.background = badge.style.background;
        result.style.color = badge.style.color;
        result.innerHTML = "<strong>LLM 요약:</strong><br/>" + message;
      }
    </script>
  </body>
</html>
