<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedi-Air Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
      }
      .app-shadow {
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
      }
      .glass {
        backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.85);
      }
      .fade {
        transition: all 0.3s ease;
      }
    </style>
  </head>

  <body class="flex justify-center items-center h-screen">
    <div
      class="w-full max-w-md h-screen bg-white rounded-3xl overflow-hidden app-shadow flex flex-col"
    >
      <!-- 헤더 -->
      <div
        class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-5 py-4"
      >
        <div class="text-lg font-bold">Pedi-Air Monitor</div>
        <div class="text-xs opacity-80">Home Ventilator Monitoring</div>
      </div>

      <!-- 콘텐츠 -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- 홈 -->
        <div id="homeScreen" class="space-y-3">
          <div class="bg-indigo-50 p-3 rounded-2xl text-sm shadow">
            안녕하세요. 오늘 아이 상태를 입력해주세요.
          </div>

          <div id="chatArea" class="space-y-2"></div>

          <div class="flex gap-2">
            <input
              id="chatInput"
              class="flex-1 border rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300"
              placeholder="입력..."
            />
            <button
              onclick="sendMessage()"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-xl text-sm"
            >
              전송
            </button>
          </div>
        </div>

        <!-- 모니터링 -->
        <div id="monitoringScreen" class="hidden space-y-4">
          <!-- monitoringScreen 안에 기존 코드 아래에 추가 -->

          <div class="rounded-2xl p-4 shadow bg-white">
            <div class="text-xs text-slate-500 mb-2">Ventilator Core</div>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div>
                <div class="text-slate-400 text-xs">PIP</div>
                <div id="pipValue" class="font-bold">22</div>
              </div>
              <div>
                <div class="text-slate-400 text-xs">VTe</div>
                <div id="vteValue" class="font-bold">160 mL</div>
              </div>
              <div>
                <div class="text-slate-400 text-xs">MinVent</div>
                <div id="mvValue" class="font-bold">4.8 L</div>
              </div>
              <div>
                <div class="text-slate-400 text-xs">Leak</div>
                <div id="leakValue" class="font-bold text-green-600">5%</div>
              </div>
            </div>
          </div>
          <div class="rounded-2xl p-4 shadow bg-white">
            <div class="text-xs text-slate-500">SpO₂</div>
            <div id="spo2Value" class="text-3xl font-bold text-green-600 fade">
              98%
            </div>
          </div>

          <div class="rounded-2xl p-4 shadow bg-white">
            <div class="text-xs text-slate-500">호흡수</div>
            <div id="rrValue" class="text-3xl font-bold">20</div>
          </div>

          <button
            onclick="toggleDanger()"
            class="w-full mt-2 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-2xl py-3 shadow"
          >
            위험 상태 시뮬레이션
          </button>
        </div>

        <!-- 리포트 -->
        <div id="reportScreen" class="hidden space-y-4">
          <div class="rounded-2xl p-5 bg-white shadow">
            <div class="text-sm font-bold mb-3 text-slate-800">
              PRO Summary Report
            </div>
            <div
              id="reportContent"
              class="text-sm text-slate-700 whitespace-pre-line leading-relaxed"
            ></div>
          </div>
        </div>
      </div>

      <!-- 하단 네비 -->
      <div class="flex border-t bg-white text-xs font-semibold">
        <button
          onclick="showScreen('home')"
          class="flex-1 py-3 text-slate-600 hover:text-indigo-600"
        >
          홈
        </button>
        <button
          onclick="showScreen('monitoring')"
          class="flex-1 py-3 text-slate-600 hover:text-indigo-600"
        >
          모니터링
        </button>
        <button onclick="openProModal()" class="flex-1 py-3 text-indigo-600">
          PRO
        </button>
        <button
          onclick="showScreen('report')"
          class="flex-1 py-3 text-slate-600 hover:text-indigo-600"
        >
          리포트
        </button>
      </div>
    </div>

    <!-- PRO 모달 -->
    <div
      id="proModal"
      class="hidden fixed inset-0 bg-black/40 flex items-center justify-center px-4"
    >
      <div class="glass w-full max-w-md rounded-3xl p-6 shadow-xl space-y-4">
        <div class="text-lg font-bold text-slate-800">상태 입력 (PRO)</div>

        <input
          id="proTemp"
          placeholder="체온 (예: 37.8)"
          class="w-full border rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300"
        />

        <input
          id="proSuction"
          placeholder="석션 횟수"
          class="w-full border rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300"
        />

        <textarea
          id="proNote"
          placeholder="추가 메모"
          class="w-full border rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300"
        ></textarea>

        <div class="flex gap-2">
          <button
            onclick="closeProModal()"
            class="flex-1 border rounded-xl py-2 text-sm"
          >
            취소
          </button>
          <button
            onclick="generateReport()"
            class="flex-1 bg-indigo-600 text-white rounded-xl py-2 text-sm hover:bg-indigo-700"
          >
            리포트 생성
          </button>
        </div>
      </div>
    </div>

    <script>
      let isDanger = false;

      function showScreen(screen) {
        document.getElementById("homeScreen").classList.add("hidden");
        document.getElementById("monitoringScreen").classList.add("hidden");
        document.getElementById("reportScreen").classList.add("hidden");

        if (screen === "home")
          document.getElementById("homeScreen").classList.remove("hidden");
        if (screen === "monitoring")
          document
            .getElementById("monitoringScreen")
            .classList.remove("hidden");
        if (screen === "report")
          document.getElementById("reportScreen").classList.remove("hidden");
      }

      function sendMessage() {
        const input = document.getElementById("chatInput");
        const area = document.getElementById("chatArea");
        if (!input.value.trim()) return;

        const div = document.createElement("div");
        div.className = "bg-indigo-100 p-2 rounded-xl text-sm shadow";
        div.innerText = input.value;
        area.appendChild(div);
        input.value = "";
      }

      function toggleDanger() {
        isDanger = !isDanger;

        const spo2 = document.getElementById("spo2Value");
        const rr = document.getElementById("rrValue");
        const pip = document.getElementById("pipValue");
        const vte = document.getElementById("vteValue");
        const leak = document.getElementById("leakValue");

        if (isDanger) {
          spo2.innerText = "88%";
          spo2.classList.remove("text-green-600");
          spo2.classList.add("text-red-600");

          rr.innerText = "34";
          pip.innerText = "30";
          vte.innerText = "120 mL";
          leak.innerText = "8%";
          leak.classList.remove("text-green-600");
          leak.classList.add("text-yellow-600");
        } else {
          spo2.innerText = "98%";
          spo2.classList.remove("text-red-600");
          spo2.classList.add("text-green-600");

          rr.innerText = "20";
          pip.innerText = "22";
          vte.innerText = "160 mL";
          leak.innerText = "5%";
          leak.classList.remove("text-yellow-600");
          leak.classList.add("text-green-600");
        }
      }

      function openProModal() {
        document.getElementById("proModal").classList.remove("hidden");
      }

      function closeProModal() {
        document.getElementById("proModal").classList.add("hidden");
      }

      function generateReport() {
        const temp = document.getElementById("proTemp").value;
        const suction = document.getElementById("proSuction").value;
        const note = document.getElementById("proNote").value;

        const report = `체온: ${temp || "-"}
석션 횟수: ${suction || "-"}
메모: ${note || "-"}

현재 SpO₂: ${document.getElementById("spo2Value").innerText}
호흡수: ${document.getElementById("rrValue").innerText}`;

        document.getElementById("reportContent").innerText = report;

        closeProModal();
        showScreen("report");
      }
      function generateReport() {
        const temp = document.getElementById("proTemp").value;
        const suction = document.getElementById("proSuction").value;
        const note = document.getElementById("proNote").value;

        const spo2 = parseInt(document.getElementById("spo2Value").innerText);
        const rr = parseInt(document.getElementById("rrValue").innerText);
        const pip = parseInt(document.getElementById("pipValue").innerText);

        let status = "GREEN";
        let interpretation = "전반적으로 안정 상태입니다.";

        if (spo2 < 94 || rr > 30 || pip > 28) {
          status = "AMBER";
          interpretation =
            "안정성 저하 경향이 감지되었습니다. 추가 관찰이 필요합니다.";
        }

        if (spo2 < 90) {
          status = "RED";
          interpretation = "저산소 위험 가능성. 즉시 의료진 확인이 필요합니다.";
        }

        const report = `체온: ${temp || "-"}
석션 횟수: ${suction || "-"}
메모: ${note || "-"}

SpO₂: ${spo2}%
RR: ${rr}
PIP: ${pip}

상태 분류: ${status}

LLM 요약:
${interpretation}`;

        document.getElementById("reportContent").innerText = report;

        closeProModal();
        showScreen("report");
      }
    </script>
  </body>
</html>
